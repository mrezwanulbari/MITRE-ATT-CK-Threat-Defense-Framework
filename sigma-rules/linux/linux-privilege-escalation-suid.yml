title: Linux SUID Binary Exploitation Attempt
id: f7a8b9c0-d1e2-3456-7890-123456a01234
status: stable
level: high
description: Detects enumeration and abuse of SUID binaries for privilege escalation (GTFOBins).
author: Shakil Md. Rezwanul Bari
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1548/001/
    - https://gtfobins.github.io/
logsource:
    category: process_creation
    product: linux
detection:
    selection_find_suid:
        CommandLine|contains:
            - 'find / -perm -4000'
            - 'find / -perm -u=s'
    selection_suid_abuse:
        CommandLine|contains:
            - 'find . -exec /bin/sh'
            - 'nmap --interactive'
            - 'env /bin/sh'
    condition: selection_find_suid or selection_suid_abuse
falsepositives:
    - System administrators auditing SUID binaries
tags:
    - attack.privilege_escalation
    - attack.t1548.001
